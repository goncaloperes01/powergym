{% extends 'ginasio/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="bi bi-exclamation-triangle-fill"></i> Atenção!</h4>
                </div>
                <div class="card-body text-center">
                    <h3 class="card-title mt-2">Cancelar Inscrição</h3>
                    <p class="lead">
                        Tem a certeza que pretende cancelar a inscrição de <strong>{{ inscricao.socio.nome }}</strong> 
                        na aula de <strong>{{ inscricao.aula }}</strong>?
                    </p>
                    <p class="text-muted small">
                        Esta ação removerá o sócio da lista de presenças desta aula.
                    </p>
                    
                    <form method="POST" class="mt-4">
                        {% csrf_token %}
                        <!-- Botão de Voltar atrás -->
                        <a href="{% url 'inscricao_detail' inscricao.pk %}" class="btn btn-secondary me-2">
                            Cancelar
                        </a>
                        <!-- Botão de Apagar mesmo -->
                        <button type="submit" class="btn btn-danger">
                            Sim, Cancelar Inscrição
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
