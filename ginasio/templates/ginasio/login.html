{% extends 'ginasio/base.html' %}

{% block title %}Login - PowerGym{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-dark text-white text-center py-4 border-0 rounded-top-4">
                    <h3 class="mb-0 fw-bold"><i class="bi bi-person-circle"></i> Área Reservada</h3>
                    <p class="text-white-50 mb-0 mt-1 small">Acede à tua conta PowerGym</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted">Nome de Utilizador</label>
                            <input type="text" name="username" class="form-control form-control-lg bg-light" placeholder="usarname" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted">Palavra-passe</label>
                            <input type="password" name="password" class="form-control form-control-lg bg-light" placeholder="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill">
                            Entrar no Sistema
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <p class="text-muted mb-2">Ainda não fazes parte da família?</p>
                        <a href="{% url 'registo_socio' %}" class="btn btn-outline-dark w-100 rounded-pill fw-bold">
                            Tornar-me Sócio Agora
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
